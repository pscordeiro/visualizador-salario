services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: visualizador-api
    restart: unless-stopped
    environment:
      APP_Jwt__Secret: ${JWT_SECRET:?JWT_SECRET é obrigatório (mínimo 32 chars)}
      APP_Jwt__Issuer: ${JWT_ISSUER:-visualizador-salario}
      APP_Jwt__Audience: ${JWT_AUDIENCE:-visualizador-salario-client}
      APP_Jwt__AccessTokenExpireMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-30}
      APP_Jwt__RefreshTokenExpireDays: ${JWT_REFRESH_TOKEN_DAYS:-7}
      APP_Cors__Origins: ${CORS_ORIGINS:-http://localhost:8080}
      APP_Storage__MaxFileSizeMB: ${MAX_UPLOAD_MB:-10}
    volumes:
      - api-data:/data
    ports:
      - "5074:5074"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5074/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: visualizador-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  api-data:
    driver: local
